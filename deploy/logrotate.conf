# Logrotate配置 - 多模态融合预测系统
# 保存到: /etc/logrotate.d/mlapp

/opt/mlapp/logs/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0644 mlapp mlapp
    sharedscripts
    postrotate
        systemctl reload mlapp > /dev/null 2>&1 || true
    endscript
}

/var/log/nginx/mlapp_*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0644 www-data www-data
    sharedscripts
    postrotate
        systemctl reload nginx > /dev/null 2>&1 || true
    endscript
}


